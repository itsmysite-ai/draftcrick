name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "Dockerfile.api"
      - "pnpm-lock.yaml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE: draftplay-api
  IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/draftplay/api

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.api \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --concurrency=80
            --timeout=60s
            --set-cloudsql-instances=${{ secrets.CLOUDSQL_CONNECTION_NAME }}
          env_vars: |
            NODE_ENV=production
            PORT=8080
            WEB_URL=https://draftplay.ai
            CORS_ORIGINS=https://draftplay.ai,https://www.draftplay.ai
            SENTRY_DSN=https://2a36c1211c8fa929c4f84f12536cd8b7@o4511091209601024.ingest.us.sentry.io/4511091210846208
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest
            FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest
            FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest
            RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest
            REVENUECAT_WEBHOOK_AUTH_KEY=REVENUECAT_WEBHOOK_AUTH_KEY:latest

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Service URL: $URL"
          curl -sf "$URL/health" | jq .
