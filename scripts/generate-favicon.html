<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { background: transparent; }
  #logo {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
  <div id="logo">
    <svg width="64" height="64" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="dp-shadow" x="-10%" y="-10%" width="130%" height="130%">
          <feDropShadow dx="0.8" dy="1.1" stdDeviation="0.7" flood-color="#1a4a30" flood-opacity="0.45" />
        </filter>
      </defs>
      <g filter="url(#dp-shadow)">
        <!-- Bowl arc -->
        <path d="M18.1 17.7 A8.35 8.35 0 0 0 18.1 34.4" stroke="#3D9968" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <!-- Vertical bar -->
        <rect x="18.1" y="5.6" width="2.8" height="30.2" fill="#3D9968"/>
      </g>
      <g filter="url(#dp-shadow)">
        <!-- Play triangle -->
        <polygon points="20.9,5.6 30.26,12.8 20.9,20.0" fill="#3D9968"/>
      </g>
      <!-- Highlight -->
      <path d="M17.8 17.4 A8.35 8.35 0 0 0 9.5 25.4" stroke="#5BBF8A" stroke-width="0.8" fill="none" opacity="0.3" stroke-linecap="round"/>
    </svg>
  </div>
</body>
</html>
